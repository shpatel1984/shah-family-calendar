<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Family Calendar</title>
<meta name="description" content="Patel Family Calendar">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendar">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --samir: #2D6A4F;
  --sneha: #374151;
  --ryan: #2563EB;
  --arya: #DB2777;
  --samir-bg: rgba(45,106,79,0.12);
  --sneha-bg: rgba(55,65,81,0.12);
  --ryan-bg: rgba(37,99,235,0.12);
  --arya-bg: rgba(219,39,119,0.12);
  --bg: #FAFAFA;
  --card: #FFFFFF;
  --border: #F0F0F0;
  --border-hover: #E5E5E5;
  --text: #111827;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

html { overflow-x: hidden; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* Loading */
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.6s, visibility 0.6s;
}
#loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.loading-text {
  margin-top: 24px;
  font-size: 0.8rem; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-secondary);
}
.loading-sub { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Header */
header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-title {
  font-size: 0.95rem; font-weight: 600;
  letter-spacing: -0.01em; color: var(--text);
}
.sync-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.7rem; font-weight: 500;
  padding: 3px 10px; border-radius: 100px;
  background: rgba(16,185,129,0.08); color: #059669;
  letter-spacing: 0.02em;
}
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #10B981;
  animation: pulse 2.5s ease-in-out infinite;
}
.sync-badge.disconnected { background: rgba(239,68,68,0.08); color: #DC2626; }
.sync-badge.disconnected .sync-dot { background: #DC2626; animation: none; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.family-legend { display: flex; align-items: center; gap: 16px; }
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.72rem; font-weight: 500; color: var(--text-secondary);
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Nav */
.nav-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 32px 16px;
}
.nav-month {
  font-size: 1.5rem; font-weight: 700;
  letter-spacing: -0.03em; color: var(--text);
}
.nav-controls { display: flex; align-items: center; gap: 6px; }
.nav-btn {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; color: var(--text-secondary);
  transition: all var(--transition);
}
.nav-btn:hover { background: var(--bg); border-color: var(--border-hover); color: var(--text); }
.today-btn {
  height: 36px; padding: 0 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; font-family: inherit;
  font-size: 0.78rem; font-weight: 500; color: var(--text-secondary);
  transition: all var(--transition);
}
.today-btn:hover { background: var(--bg); color: var(--text); }
.add-event-btn {
  height: 36px; padding: 0 16px; border-radius: 10px;
  border: none; background: var(--text); color: #fff;
  cursor: pointer; font-family: inherit;
  font-size: 0.78rem; font-weight: 500;
  display: flex; align-items: center; gap: 5px;
  transition: all var(--transition);
}
.add-event-btn:hover { background: #374151; }
.bulk-select-btn {
  height: 36px; padding: 0 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; font-family: inherit;
  font-size: 0.78rem; font-weight: 500; color: var(--text-secondary);
  transition: all var(--transition);
}
.bulk-select-btn:hover { background: var(--bg); color: var(--text); }
.bulk-select-btn.active { background: #EF4444; color: #fff; border-color: #EF4444; }

/* Calendar */
.calendar-wrapper { padding: 0 32px 32px; max-width: 100%; overflow: hidden; }
.weekday-row {
  display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
  margin-bottom: 4px;
}
.weekday-cell {
  text-align: center; padding: 8px 0;
  font-size: 0.68rem; font-weight: 600;
  color: var(--text-tertiary); text-transform: uppercase;
  letter-spacing: 0.1em;
}
.calendar-grid {
  display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--border);
  gap: 1px;
  max-width: 100%;
}
.day-cell {
  background: var(--card);
  min-height: 130px; padding: 8px 8px 6px;
  cursor: pointer; transition: background var(--transition);
  display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
}
.day-cell:hover { background: #F9FAFB; }
.day-cell.other-month { background: #FAFAFA; }
.day-cell.other-month .day-num { color: var(--text-tertiary); }
.day-cell.today .day-num {
  background: var(--text); color: #fff;
  width: 28px; height: 28px; border-radius: 8px;
}
.day-cell.selected { background: #EFF6FF; outline: 2px solid var(--ryan); outline-offset: -2px; }
.day-cell.in-range { background: #F5F8FF; }
.day-num {
  font-size: 0.78rem; font-weight: 500;
  color: var(--text); width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
}
.day-events { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow: hidden; min-width: 0; }
.event-pill {
  padding: 3px 8px; border-radius: 6px;
  font-size: 0.68rem; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.5;
  display: flex; align-items: center;
  transition: opacity var(--transition);
  min-width: 0; max-width: 100%;
}
.event-pill[style*="--samir"], .event-pill[data-who="Samir"] { background: var(--samir-bg); color: var(--samir); }
.event-pill[style*="--sneha"], .event-pill[data-who="Sneha"] { background: var(--sneha-bg); color: var(--sneha); }
.event-pill[style*="--ryan"], .event-pill[data-who="Ryan"] { background: var(--ryan-bg); color: var(--ryan); }
.event-pill[style*="--arya"], .event-pill[data-who="Arya"] { background: var(--arya-bg); color: var(--arya); }
.event-pill-text { overflow: hidden; text-overflow: ellipsis; flex: 1; }
.pill-actions {
  display: none; align-items: center; gap: 2px;
  flex-shrink: 0; margin-left: 3px;
}
.pill-edit, .pill-delete {
  display: flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 4px;
  background: rgba(0,0,0,0.08); color: inherit;
  font-size: 0.55rem; font-weight: 700;
  cursor: pointer; flex-shrink: 0;
  border: none; padding: 0; line-height: 1;
  opacity: 0.6; transition: all var(--transition);
}
.pill-edit:hover { opacity: 1; background: rgba(37,99,235,0.15); color: var(--ryan); }
.pill-delete:hover { opacity: 1; background: rgba(239,68,68,0.15); color: #EF4444; }
.event-pill:hover .pill-actions { display: flex; }
@media (pointer: coarse) { .pill-actions { display: flex; } }
.pill-checkbox {
  width: 13px; height: 13px; cursor: pointer;
  accent-color: #EF4444; flex-shrink: 0; margin-right: 4px;
}
.event-more {
  font-size: 0.64rem; color: var(--text-tertiary);
  font-weight: 500; padding: 1px 4px;
}

/* Bulk Bar */
.bulk-bar {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 150; background: var(--text); color: #fff;
  padding: 10px 20px; border-radius: 14px;
  font-size: 0.82rem; font-weight: 500;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-lg);
}
.bulk-bar button {
  padding: 6px 14px; border-radius: 8px; border: none;
  cursor: pointer; font-family: inherit;
  font-weight: 500; font-size: 0.78rem;
}
.bulk-delete-btn { background: #EF4444; color: #fff; }
.bulk-delete-btn:hover { background: #DC2626; }
.bulk-cancel-btn { background: rgba(255,255,255,0.12); color: #fff; border: none !important; }
.bulk-cancel-btn:hover { background: rgba(255,255,255,0.2); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
}
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal {
  background: var(--card);
  border-radius: 20px;
  width: 100%; max-width: 440px;
  max-height: 85vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: translateY(8px) scale(0.98);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.modal-overlay.active .modal { transform: translateY(0) scale(1); }
.modal-header {
  padding: 24px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title {
  font-size: 1.05rem; font-weight: 700;
  letter-spacing: -0.02em;
}
.modal-close {
  width: 32px; height: 32px; border-radius: 10px;
  border: none; background: var(--bg); cursor: pointer;
  font-size: 0.9rem; color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-body { padding: 20px 24px 24px; }

/* Day Detail */
.day-event-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.day-event-item:last-child { border-bottom: none; }
.day-event-color {
  width: 3px; min-height: 32px; border-radius: 2px;
  flex-shrink: 0; margin-top: 2px;
}
.day-event-info { flex: 1; min-width: 0; }
.day-event-title { font-weight: 600; font-size: 0.85rem; letter-spacing: -0.01em; }
.day-event-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
.day-event-notes { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 3px; font-style: italic; }
.day-event-actions { display: flex; gap: 4px; flex-shrink: 0; }
.day-event-edit, .day-event-delete {
  width: 30px; height: 30px; border-radius: 8px;
  border: none; background: var(--bg); cursor: pointer;
  color: var(--text-tertiary); font-size: 0.8rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); flex-shrink: 0;
  font-family: inherit;
}
.day-event-edit:hover { background: #EFF6FF; color: var(--ryan); }
.day-event-delete:hover { background: #FEF2F2; color: #EF4444; }
.no-events {
  text-align: center; padding: 40px 0;
  color: var(--text-tertiary); font-size: 0.85rem; font-weight: 400;
}
.day-add-btn {
  width: 100%; padding: 10px; margin-top: 12px;
  border: 1.5px dashed var(--border); border-radius: var(--radius-sm);
  background: transparent; cursor: pointer;
  font-family: inherit;
  font-size: 0.78rem; font-weight: 500; color: var(--text-tertiary);
  transition: all var(--transition);
}
.day-add-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); background: var(--bg); }

/* Form */
.form-group { margin-bottom: 18px; }
.form-label {
  display: block; font-size: 0.72rem; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.form-input, .form-textarea {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 0.85rem;
  color: var(--text); background: var(--bg);
  transition: all var(--transition);
  outline: none;
}
.form-input:focus, .form-textarea:focus {
  border-color: var(--text);
  background: var(--card);
  box-shadow: 0 0 0 3px rgba(17,24,39,0.06);
}
.form-textarea { resize: vertical; min-height: 72px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.who-toggles { display: flex; gap: 8px; flex-wrap: wrap; }
.who-toggle {
  padding: 7px 16px; border-radius: 100px;
  border: 1.5px solid var(--border); background: var(--card);
  cursor: pointer; font-family: inherit;
  font-size: 0.78rem; font-weight: 500;
  transition: all var(--transition); color: var(--text-secondary);
}
.who-toggle:hover { border-color: var(--border-hover); color: var(--text); }
.who-toggle.selected { color: #fff; border-color: transparent; }
.who-toggle[data-who="Samir"].selected { background: var(--samir); }
.who-toggle[data-who="Sneha"].selected { background: var(--sneha); }
.who-toggle[data-who="Ryan"].selected { background: var(--ryan); }
.who-toggle[data-who="Arya"].selected { background: var(--arya); }
.form-submit {
  width: 100%; padding: 11px; margin-top: 8px;
  border: none; border-radius: var(--radius-sm);
  background: var(--text); color: #fff;
  font-family: inherit;
  font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
  letter-spacing: -0.01em;
}
.form-submit:hover { background: #374151; }
.form-submit:disabled { opacity: 0.4; cursor: not-allowed; }

/* Responsive - Tablet */
@media (max-width: 768px) {
  header { padding: 12px 16px; }
  .header-title { font-size: 0.85rem; }
  .nav-bar { padding: 16px 16px 10px; }
  .nav-month { font-size: 1.2rem; }
  .calendar-wrapper { padding: 0 8px 16px; }
  .day-cell { min-height: 90px; padding: 4px; }
  .day-num { font-size: 0.7rem; width: 22px; height: 22px; }
  .event-pill { font-size: 0.6rem; padding: 2px 5px; }
  .family-legend { gap: 10px; }
  .legend-item { font-size: 0.65rem; }
  .nav-controls { gap: 4px; }
  .nav-btn, .today-btn, .add-event-btn, .bulk-select-btn { height: 32px; font-size: 0.72rem; }
  .nav-btn { width: 32px; }
}

/* Responsive - Mobile */
@media (max-width: 480px) {
  html, body { overflow-x: hidden; width: 100vw; }
  header {
    padding: 10px 12px;
    flex-direction: column; align-items: flex-start; gap: 6px;
  }
  .header-left { width: 100%; justify-content: space-between; }
  .family-legend { width: 100%; justify-content: flex-start; gap: 12px; }
  .legend-item { font-size: 0.68rem; }
  .legend-dot { width: 7px; height: 7px; }

  .nav-bar {
    padding: 10px 8px 6px;
    flex-wrap: wrap; gap: 6px;
  }
  .nav-month { font-size: 1.1rem; }
  .nav-controls { gap: 4px; }
  .nav-btn { width: 28px; height: 28px; font-size: 0.85rem; border-radius: 8px; }
  .today-btn { height: 28px; padding: 0 8px; font-size: 0.68rem; border-radius: 8px; }
  .add-event-btn { height: 28px; padding: 0 10px; font-size: 0.68rem; border-radius: 8px; }
  .add-event-btn span { display: none; }
  .add-event-btn::before { content: '+'; font-size: 0.95rem; }
  .bulk-select-btn { height: 28px; padding: 0 8px; font-size: 0.68rem; border-radius: 8px; }

  .calendar-wrapper { padding: 0 0 8px; }
  .weekday-row { margin-bottom: 0; padding: 0 2px; }
  .weekday-cell { font-size: 0.55rem; padding: 4px 0; letter-spacing: 0.04em; }

  .calendar-grid { border-radius: 0; border-left: none; border-right: none; }
  .day-cell { min-height: 64px; padding: 2px; }
  .day-num { font-size: 0.62rem; width: 18px; height: 18px; margin-bottom: 1px; }
  .day-cell.today .day-num { width: 18px; height: 18px; border-radius: 5px; font-size: 0.62rem; }
  .day-events { gap: 1px; }
  .event-pill { font-size: 0.5rem; padding: 1px 3px; border-radius: 3px; line-height: 1.35; }
  .pill-actions { display: none !important; }
  .event-more { font-size: 0.5rem; }

  /* Modal adjustments */
  .modal-overlay { padding: 8px; }
  .modal { border-radius: 16px; max-width: 100%; }
  .modal-header { padding: 16px 16px 0; }
  .modal-title { font-size: 0.95rem; }
  .modal-body { padding: 14px 16px 20px; }
  .modal-close { width: 28px; height: 28px; font-size: 0.8rem; }

  .form-input, .form-textarea { padding: 9px 12px; font-size: 0.82rem; }
  .form-row { grid-template-columns: 1fr 1fr; gap: 8px; }
  .who-toggle { padding: 6px 12px; font-size: 0.72rem; }
  .form-submit { padding: 10px; font-size: 0.82rem; }

  .day-event-edit, .day-event-delete { width: 28px; height: 28px; }
  .day-event-title { font-size: 0.82rem; }
  .day-event-meta { font-size: 0.72rem; }

  /* Toast */
  .undo-toast { padding: 10px 14px; font-size: 0.75rem; gap: 10px; border-radius: 12px; bottom: 16px; max-width: calc(100vw - 24px); }
  .undo-toast-btn { padding: 4px 12px; font-size: 0.72rem; }

  /* Bulk bar */
  .bulk-bar { padding: 8px 14px; font-size: 0.75rem; gap: 8px; border-radius: 12px; bottom: 16px; max-width: calc(100vw - 24px); }
  .bulk-bar button { padding: 5px 10px; font-size: 0.72rem; }

  /* Selection bar */
  #selection-bar { font-size: 0.72rem !important; padding: 8px 12px !important; gap: 8px !important; max-width: calc(100vw - 24px) !important; flex-wrap: wrap !important; justify-content: center !important; border-radius: 12px !important; bottom: 16px !important; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* Undo Toast */
.undo-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  z-index: 300; background: #111827; color: #fff;
  padding: 12px 20px; border-radius: 14px;
  font-size: 0.82rem; font-weight: 500;
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  opacity: 0; transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  pointer-events: none; font-family: 'Inter', sans-serif;
}
.undo-toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
.undo-toast-btn {
  padding: 5px 14px; border-radius: 8px; border: none;
  background: #fff; color: #111827;
  cursor: pointer; font-family: inherit;
  font-weight: 600; font-size: 0.78rem;
  transition: background 0.15s;
}
.undo-toast-btn:hover { background: #E5E7EB; }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Family Calendar</div>
  <div class="loading-sub"></div>
</div>

<header>
  <div class="header-left">
    <div class="header-title">Family Calendar</div>
    <div class="sync-badge" id="sync-badge">
      <span class="sync-dot"></span>
      <span id="sync-text">Live</span>
    </div>
  </div>
  <div class="family-legend">
    <div class="legend-item"><span class="legend-dot" style="background:var(--samir)"></span>Samir</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--sneha)"></span>Sneha</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function() {
  const SUPABASE_URL = 'https://ptuptzyduhudfkdbyuen.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_SM40EKOS7msjnOqoUPQ2FQ_fAEWf0R0';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const COLORS = { Samir: '#2D6A4F', Sneha: '#374151', Ryan: '#2563EB', Arya: '#DB2777' };
  const COLOR_BG = {
    Samir: 'rgba(45,106,79,0.10)', Sneha: 'rgba(55,65,81,0.10)',
    Ryan: 'rgba(37,99,235,0.10)', Arya: 'rgba(219,39,119,0.10)'
  };
  const MEMBERS = ['Samir', 'Sneha', 'Ryan', 'Arya'];
  let events = [];
  let currentYear = 2026;
  let currentMonth = 5;
  let selectedWho = new Set();
  let selectStart = null;
  let selectEnd = null;
  let editingEventId = null;
  let bulkMode = false;
  let bulkSelected = new Set();
  let undoStack = []; // { type, data } for undo operations
  let undoTimer = null;

  const $ = id => document.getElementById(id);
  const grid = $('calendar-grid');
  const navMonth = $('nav-month');
  const loadingScreen = $('loading-screen');
  const syncBadge = $('sync-badge');
  const syncText = $('sync-text');
  const dayModal = $('day-modal');
  const dayModalTitle = $('day-modal-title');
  const dayModalBody = $('day-modal-body');
  const addModal = $('add-modal');
  const addForm = $('add-form');

  function dateStr(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  function parseDate(s) {
    const [y,m,d] = s.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  function fmtDate(s) {
    const d = parseDate(s);
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }
  function fmtTime(t) {
    if (!t) return '';
    const [h,m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hr = h % 12 || 12;
    return `${hr}:${String(m).padStart(2,'0')} ${ampm}`;
  }
  function isToday(y, m, d) {
    const t = new Date();
    return t.getFullYear() === y && t.getMonth() === m && t.getDate() === d;
  }
  function eventsForDate(dateString) {
    return events.filter(e => e.start <= dateString && e.end >= dateString);
  }

  function render() {
    const monthNames = ['January','February','March','April','May','June',
                        'July','August','September','October','November','December'];
    navMonth.textContent = `${monthNames[currentMonth]} ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevDays = new Date(currentYear, currentMonth, 0).getDate();

    let html = '';
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      let day, month = currentMonth, year = currentYear, isOther = false;
      if (i < firstDay) {
        day = prevDays - firstDay + 1 + i;
        month = currentMonth - 1;
        if (month < 0) { month = 11; year--; }
        isOther = true;
      } else if (i - firstDay >= daysInMonth) {
        day = i - firstDay - daysInMonth + 1;
        month = currentMonth + 1;
        if (month > 11) { month = 0; year++; }
        isOther = true;
      } else {
        day = i - firstDay + 1;
      }

      const ds = dateStr(year, month, day);
      const dayEvents = eventsForDate(ds);
      const today = isToday(year, month, day);
      const classes = ['day-cell'];
      if (isOther) classes.push('other-month');
      if (today) classes.push('today');

      html += `<div class="${classes.join(' ')}" data-date="${ds}">`;
      html += `<div class="day-num">${day}</div>`;
      html += `<div class="day-events">`;

      const maxPills = 4;
      const shown = dayEvents.slice(0, maxPills);
      const remaining = dayEvents.length - maxPills;

      for (const ev of shown) {
        const bg = COLOR_BG[ev.who] || 'rgba(0,0,0,0.08)';
        const fg = COLORS[ev.who] || '#666';
        if (bulkMode) {
          const checked = bulkSelected.has(String(ev.id)) ? 'checked' : '';
          html += `<div class="event-pill" style="background:${bg};color:${fg}"><input type="checkbox" class="pill-checkbox" data-id="${ev.id}" ${checked}><span class="event-pill-text">${ev.title}</span></div>`;
        } else {
          html += `<div class="event-pill" style="background:${bg};color:${fg}" title="${ev.title} (${ev.who})"><span class="event-pill-text">${ev.title}</span><span class="pill-actions"><button class="pill-edit" data-id="${ev.id}" style="color:${fg}">&#9998;</button><button class="pill-delete" data-id="${ev.id}" style="color:${fg}">&#x2715;</button></span></div>`;
        }
      }
      if (remaining > 0) {
        html += `<div class="event-more">+${remaining} more</div>`;
      }
      html += `</div></div>`;
    }
    grid.innerHTML = html;

    if (selectStart) {
      grid.querySelectorAll('.day-cell').forEach(cell => {
        const d = cell.dataset.date;
        const lo = selectEnd ? (selectStart < selectEnd ? selectStart : selectEnd) : selectStart;
        const hi = selectEnd ? (selectStart < selectEnd ? selectEnd : selectStart) : selectStart;
        if (d === lo || d === hi) cell.classList.add('selected');
        else if (d > lo && d < hi) cell.classList.add('in-range');
      });
    }

    if (bulkMode) {
      grid.querySelectorAll('.pill-checkbox').forEach(cb => {
        cb.addEventListener('click', (e) => e.stopPropagation());
        cb.addEventListener('change', () => {
          const id = cb.dataset.id;
          if (cb.checked) bulkSelected.add(id); else bulkSelected.delete(id);
          updateBulkBar();
        });
      });
      updateBulkBar();
    } else {
      hideBulkBar();
      grid.querySelectorAll('.pill-edit').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const ev = events.find(ev => String(ev.id) === btn.dataset.id);
          if (ev) openEditModal(ev);
        });
      });
      grid.querySelectorAll('.pill-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const cellDate = btn.closest('.day-cell').dataset.date;
          await removeEventFromDate(btn.dataset.id, cellDate);
        });
      });
    }

    grid.querySelectorAll('.day-cell').forEach(cell => {
      cell.addEventListener('click', () => { if (!bulkMode) handleDayClick(cell.dataset.date); });
    });
  }

  function handleDayClick(dateString) {
    const dayEvents = eventsForDate(dateString);
    if (!selectStart) {
      if (dayEvents.length > 0) {
        openDayModal(dateString);
      } else {
        selectStart = dateString;
        selectEnd = null;
        render();
        showSelectionBar();
      }
    } else if (!selectEnd && dateString !== selectStart) {
      selectEnd = dateString;
      const lo = selectStart < selectEnd ? selectStart : selectEnd;
      const hi = selectStart < selectEnd ? selectEnd : selectStart;
      render();
      setTimeout(() => {
        hideSelectionBar();
        openAddModal(lo, hi);
        clearSelection();
      }, 300);
    } else {
      hideSelectionBar();
      openAddModal(dateString, dateString);
      clearSelection();
    }
  }

  function clearSelection() { selectStart = null; selectEnd = null; render(); }

  function showSelectionBar() {
    let bar = $('selection-bar');
    if (!bar) {
      bar = document.createElement('div');
      bar.id = 'selection-bar';
      bar.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:150;background:#111827;color:#fff;padding:10px 20px;border-radius:14px;font-size:0.82rem;font-weight:500;display:flex;align-items:center;gap:12px;box-shadow:0 20px 60px rgba(0,0,0,0.15);font-family:Inter,sans-serif;';
      document.body.appendChild(bar);
    }
    const d = parseDate(selectStart);
    const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    bar.innerHTML = `<span>${label} selected &mdash; click another date for a range</span>
      <button id="sel-add" style="padding:6px 14px;border-radius:8px;border:none;background:#fff;color:#111827;cursor:pointer;font-family:inherit;font-weight:600;font-size:0.78rem;">Add Event</button>
      <button id="sel-cancel" style="padding:6px 14px;border-radius:8px;border:none;background:rgba(255,255,255,0.12);color:#fff;cursor:pointer;font-family:inherit;font-weight:500;font-size:0.78rem;">Cancel</button>`;
    $('sel-add').addEventListener('click', () => {
      hideSelectionBar();
      openAddModal(selectStart, selectStart);
      clearSelection();
    });
    $('sel-cancel').addEventListener('click', () => {
      hideSelectionBar();
      clearSelection();
    });
    bar.style.display = 'flex';
  }

  function hideSelectionBar() {
    const bar = $('selection-bar');
    if (bar) bar.style.display = 'none';
  }

  function openDayModal(dateString) {
    dayModalTitle.textContent = fmtDate(dateString);
    const dayEvents = eventsForDate(dateString);

    let html = '';
    if (dayEvents.length === 0) {
      html = '<div class="no-events">No events this day</div>';
    } else {
      for (const ev of dayEvents) {
        const color = COLORS[ev.who] || '#999';
        let meta = ev.who;
        if (ev.start !== ev.end) {
          meta += ` \u00B7 ${parseDate(ev.start).toLocaleDateString('en-US',{month:'short',day:'numeric'})} \u2013 ${parseDate(ev.end).toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
        }
        if (ev.start_time) {
          meta += ` \u00B7 ${fmtTime(ev.start_time)}`;
          if (ev.end_time) meta += `\u2013${fmtTime(ev.end_time)}`;
        }
        html += `<div class="day-event-item">
          <div class="day-event-color" style="background:${color}"></div>
          <div class="day-event-info">
            <div class="day-event-title">${esc(ev.title)}</div>
            <div class="day-event-meta">${esc(meta)}</div>
            ${ev.notes ? `<div class="day-event-notes">${esc(ev.notes)}</div>` : ''}
          </div>
          <div class="day-event-actions">
            <button class="day-event-edit" data-id="${ev.id}" title="Edit">&#9998;</button>
            <button class="day-event-delete" data-id="${ev.id}" title="Delete">&#x2715;</button>
          </div>
        </div>`;
      }
    }
    html += `<button class="day-add-btn" data-date="${dateString}">+ Add Event</button>`;
    dayModalBody.innerHTML = html;

    dayModalBody.querySelectorAll('.day-event-edit').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const ev = events.find(ev => String(ev.id) === btn.dataset.id);
        if (ev) { closeDayModal(); openEditModal(ev); }
      });
    });
    dayModalBody.querySelectorAll('.day-event-delete').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        await removeEventFromDate(btn.dataset.id, dateString);
        openDayModal(dateString);
      });
    });
    dayModalBody.querySelector('.day-add-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      closeDayModal();
      openAddModal(dateString, dateString);
    });
    dayModal.classList.add('active');
  }

  function closeDayModal() { dayModal.classList.remove('active'); }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function openAddModal(startDate, endDate) {
    editingEventId = null;
    addForm.reset();
    selectedWho.clear();
    document.querySelectorAll('.who-toggle').forEach(b => b.classList.remove('selected'));
    if (startDate) {
      $('f-start').value = startDate;
      $('f-end').value = endDate || startDate;
    }
    $('add-modal-title').textContent = 'Add Event';
    $('f-submit').textContent = 'Add Event';
    addModal.classList.add('active');
  }

  function openEditModal(ev) {
    editingEventId = ev.id;
    addForm.reset();
    selectedWho.clear();
    document.querySelectorAll('.who-toggle').forEach(b => b.classList.remove('selected'));
    $('f-title').value = ev.title;
    $('f-start').value = ev.start;
    $('f-end').value = ev.end;
    $('f-start-time').value = ev.start_time || '';
    $('f-end-time').value = ev.end_time || '';
    $('f-notes').value = ev.notes || '';
    selectedWho.add(ev.who);
    document.querySelector(`.who-toggle[data-who="${ev.who}"]`).classList.add('selected');
    $('add-modal-title').textContent = 'Edit Event';
    $('f-submit').textContent = 'Save Changes';
    addModal.classList.add('active');
  }

  function closeAddModal() { addModal.classList.remove('active'); editingEventId = null; }

  document.querySelectorAll('.who-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const who = btn.dataset.who;
      if (selectedWho.has(who)) { selectedWho.delete(who); btn.classList.remove('selected'); }
      else { selectedWho.add(who); btn.classList.add('selected'); }
    });
  });

  addForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (selectedWho.size === 0) { alert('Please select at least one person.'); return; }
    const title = $('f-title').value.trim();
    const start = $('f-start').value;
    const end = $('f-end').value;
    const startTime = $('f-start-time').value || null;
    const endTime = $('f-end-time').value || null;
    const notes = $('f-notes').value.trim() || null;

    if (!title || !start || !end) return;
    if (end < start) { alert('End date must be on or after start date.'); return; }

    $('f-submit').disabled = true;
    $('f-submit').textContent = 'Saving\u2026';

    if (editingEventId) {
      const who = [...selectedWho][0];
      const updates = { title, who, start, end, start_time: startTime, end_time: endTime, notes };
      const { data, error } = await sb.from('events').update(updates).eq('id', editingEventId).select();
      if (error) { alert('Error updating: ' + error.message); }
      else if (data && data[0]) {
        const idx = events.findIndex(e => e.id === editingEventId);
        if (idx >= 0) events[idx] = data[0];
      }
    } else {
      const rows = [...selectedWho].map(who => ({
        title, who, start, end, start_time: startTime, end_time: endTime, notes
      }));
      const { data, error } = await sb.from('events').insert(rows).select();
      if (error) { alert('Error saving: ' + error.message); }
      else if (data) { events.push(...data); }
    }

    $('f-submit').disabled = false;
    $('f-submit').textContent = editingEventId ? 'Save Changes' : 'Add Event';
    closeAddModal();
    render();
  });

  async function loadEvents() {
    const { data, error } = await sb.from('events').select('*');
    if (error) { console.error('Load error:', error); return; }
    events = data || [];
  }

  // --- Undo Toast ---
  function showUndo(message, undoFn) {
    clearTimeout(undoTimer);
    $('undo-toast-text').textContent = message;
    const toast = $('undo-toast');
    toast.classList.add('visible');
    // Replace undo handler
    const btn = $('undo-toast-btn');
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.id = 'undo-toast-btn';
    newBtn.addEventListener('click', async () => {
      toast.classList.remove('visible');
      clearTimeout(undoTimer);
      await undoFn();
      render();
    });
    undoTimer = setTimeout(() => toast.classList.remove('visible'), 6000);
  }

  async function deleteEvent(id) {
    const ev = events.find(e => String(e.id) === String(id));
    const snapshot = ev ? { ...ev } : null;
    const { error } = await sb.from('events').delete().eq('id', id);
    if (error) { alert('Error deleting: ' + error.message); return; }
    events = events.filter(e => String(e.id) !== String(id));
    render();
    if (snapshot) {
      showUndo(`"${snapshot.title}" removed`, async () => {
        const { id: _, ...rest } = snapshot;
        const { data, error } = await sb.from('events').insert([rest]).select();
        if (!error && data) events.push(...data);
      });
    }
  }

  function nextDay(ds) {
    const d = parseDate(ds); d.setDate(d.getDate() + 1);
    return dateStr(d.getFullYear(), d.getMonth(), d.getDate());
  }
  function prevDay(ds) {
    const d = parseDate(ds); d.setDate(d.getDate() - 1);
    return dateStr(d.getFullYear(), d.getMonth(), d.getDate());
  }

  async function removeEventFromDate(id, dateString) {
    const ev = events.find(e => String(e.id) === String(id));
    if (!ev) return;
    const snapshot = { ...ev };

    // Single-day event: just delete entirely
    if (ev.start === ev.end) {
      await deleteEvent(id);
      return;
    }

    // Multi-day: removing from start edge
    if (dateString === ev.start) {
      const oldStart = ev.start;
      const newStart = nextDay(ev.start);
      const { data, error } = await sb.from('events').update({ start: newStart }).eq('id', ev.id).select();
      if (error) { alert('Error updating: ' + error.message); return; }
      if (data && data[0]) { const idx = events.findIndex(e => e.id === ev.id); if (idx >= 0) events[idx] = data[0]; }
      render();
      showUndo(`"${ev.title}" removed from ${fmtShort(dateString)}`, async () => {
        const { data } = await sb.from('events').update({ start: oldStart }).eq('id', ev.id).select();
        if (data && data[0]) { const idx = events.findIndex(e => e.id === ev.id); if (idx >= 0) events[idx] = data[0]; }
      });
      return;
    }

    // Multi-day: removing from end edge
    if (dateString === ev.end) {
      const oldEnd = ev.end;
      const newEnd = prevDay(ev.end);
      const { data, error } = await sb.from('events').update({ end: newEnd }).eq('id', ev.id).select();
      if (error) { alert('Error updating: ' + error.message); return; }
      if (data && data[0]) { const idx = events.findIndex(e => e.id === ev.id); if (idx >= 0) events[idx] = data[0]; }
      render();
      showUndo(`"${ev.title}" removed from ${fmtShort(dateString)}`, async () => {
        const { data } = await sb.from('events').update({ end: oldEnd }).eq('id', ev.id).select();
        if (data && data[0]) { const idx = events.findIndex(e => e.id === ev.id); if (idx >= 0) events[idx] = data[0]; }
      });
      return;
    }

    // Multi-day: removing from the middle — split into two events
    const endBefore = prevDay(dateString);
    const startAfter = nextDay(dateString);
    const origEnd = ev.end;

    const { data: updated, error: err1 } = await sb.from('events').update({ end: endBefore }).eq('id', ev.id).select();
    if (err1) { alert('Error updating: ' + err1.message); return; }
    if (updated && updated[0]) { const idx = events.findIndex(e => e.id === ev.id); if (idx >= 0) events[idx] = updated[0]; }

    const newRow = {
      title: ev.title, who: ev.who, start: startAfter, end: ev.end,
      start_time: ev.start_time, end_time: ev.end_time, notes: ev.notes
    };
    const { data: inserted, error: err2 } = await sb.from('events').insert([newRow]).select();
    if (err2) { alert('Error creating split: ' + err2.message); return; }
    const newId = inserted && inserted[0] ? inserted[0].id : null;
    if (inserted) events.push(...inserted);

    render();
    showUndo(`"${ev.title}" removed from ${fmtShort(dateString)}`, async () => {
      // Undo: restore original end, delete the split portion
      await sb.from('events').update({ end: origEnd }).eq('id', ev.id).select().then(({ data }) => {
        if (data && data[0]) { const idx = events.findIndex(e => e.id === ev.id); if (idx >= 0) events[idx] = data[0]; }
      });
      if (newId) {
        await sb.from('events').delete().eq('id', newId);
        events = events.filter(e => e.id !== newId);
      }
    });
  }

  function fmtShort(ds) {
    return parseDate(ds).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  async function seedIfEmpty() {
    const { count, error } = await sb.from('events').select('*', { count: 'exact', head: true });
    if (error || count > 0) return;

    const seed = [];
    function add(title, start, end, whoList, startTime, endTime, notes) {
      for (const who of whoList) {
        seed.push({ title, start, end, who, start_time: startTime || null, end_time: endTime || null, notes: notes || null });
      }
    }
    const ALL = ['Samir','Sneha','Ryan','Arya'];
    const SS = ['Samir','Sneha'];
    const RA = ['Ryan','Arya'];

    add('Nisha & Ronak Family \u2013 Miami','2026-04-02','2026-04-05', ALL);
    add('Mexico (Departure)','2026-06-04','2026-06-04', SS);
    add('Mexico Trip','2026-06-05','2026-06-08', SS);
    add('Mexico (Return)','2026-06-09','2026-06-09', SS);
    add('Working from Orlando','2026-06-10','2026-06-12', SS);
    add('Orlando \u2013 Grandparents','2026-06-04','2026-06-13', ['Arya']);
    add('Orlando \u2013 Grandparents','2026-06-04','2026-06-07', ['Ryan']);
    add('UCF Baseball Camp','2026-06-08','2026-06-11', ['Ryan'], '09:00','15:00');
    add('Orlando \u2013 Grandparents','2026-06-12','2026-06-12', ['Ryan']);
    add('Return to Miami','2026-06-13','2026-06-13', ALL);
    add('MCDS \u2013 Day Camp','2026-06-15','2026-06-19', ['Arya']);
    add('MCDS \u2013 Architecture Camp','2026-06-15','2026-06-19', ['Ryan']);
    add('MOCA Camp','2026-07-13','2026-07-17', ['Arya']);
    add('School of Rock Camp','2026-07-20','2026-07-24', ['Ryan']);
    add('Shah Family Trip - NJ (Depart)','2026-07-31','2026-07-31', ALL);
    add('Shah Family Trip - NJ','2026-08-01','2026-08-02', SS);
    add('Shah Family Trip - NJ','2026-08-01','2026-08-08', RA);
    add('Working from NJ','2026-08-03','2026-08-07', SS);
    add('Shah Family Trip - NJ','2026-08-08','2026-08-08', SS);
    add('Shah Family Trip - NJ (Return)','2026-08-09','2026-08-09', ALL);
    add('First Day of School','2026-08-13','2026-08-13', RA);

    const { error: seedError } = await sb.from('events').insert(seed);
    if (seedError) console.error('Seed error:', seedError);
  }

  function subscribeRealtime() {
    sb.channel('events-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, (payload) => {
        if (payload.eventType === 'INSERT') {
          if (!events.find(e => e.id === payload.new.id)) events.push(payload.new);
        } else if (payload.eventType === 'DELETE') {
          events = events.filter(e => e.id !== payload.old.id);
        } else if (payload.eventType === 'UPDATE') {
          const idx = events.findIndex(e => e.id === payload.new.id);
          if (idx >= 0) events[idx] = payload.new;
        }
        render();
      })
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          syncBadge.classList.remove('disconnected');
          syncText.textContent = 'Live';
        } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
          syncBadge.classList.add('disconnected');
          syncText.textContent = 'Offline';
        }
      });
  }

  function updateBulkBar() {
    let bar = document.querySelector('.bulk-bar');
    if (!bar) {
      bar = document.createElement('div');
      bar.className = 'bulk-bar';
      document.body.appendChild(bar);
    }
    const count = bulkSelected.size;
    bar.innerHTML = `<span>${count} event${count !== 1 ? 's' : ''} selected</span>
      <button class="bulk-delete-btn" ${count === 0 ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}>Delete Selected</button>
      <button class="bulk-cancel-btn">Done</button>`;
    bar.querySelector('.bulk-delete-btn').addEventListener('click', async () => {
      if (bulkSelected.size === 0) return;
      const ids = [...bulkSelected];
      const snapshots = events.filter(e => ids.includes(String(e.id))).map(e => ({...e}));
      const { error } = await sb.from('events').delete().in('id', ids.map(Number));
      if (error) { alert('Error deleting: ' + error.message); return; }
      events = events.filter(e => !ids.includes(String(e.id)));
      bulkSelected.clear();
      render();
      showUndo(`${snapshots.length} event${snapshots.length !== 1 ? 's' : ''} removed`, async () => {
        const rows = snapshots.map(({ id, ...rest }) => rest);
        const { data, error } = await sb.from('events').insert(rows).select();
        if (!error && data) events.push(...data);
      });
    });
    bar.querySelector('.bulk-cancel-btn').addEventListener('click', () => {
      bulkMode = false;
      bulkSelected.clear();
      $('bulk-select-btn').classList.remove('active');
      hideBulkBar();
      render();
    });
    bar.style.display = 'flex';
  }
  function hideBulkBar() {
    const bar = document.querySelector('.bulk-bar');
    if (bar) bar.style.display = 'none';
  }

  $('bulk-select-btn').addEventListener('click', () => {
    bulkMode = !bulkMode;
    bulkSelected.clear();
    $('bulk-select-btn').classList.toggle('active', bulkMode);
    if (!bulkMode) hideBulkBar();
    render();
  });

  $('prev-btn').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    render();
  });
  $('next-btn').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    render();
  });
  $('today-btn').addEventListener('click', () => {
    const t = new Date();
    currentYear = t.getFullYear();
    currentMonth = t.getMonth();
    render();
  });
  $('refresh-btn').addEventListener('click', async () => {
    $('refresh-btn').style.animation = 'spin 0.6s linear';
    await loadEvents();
    render();
    setTimeout(() => $('refresh-btn').style.animation = '', 600);
  });
  $('add-event-btn').addEventListener('click', () => { hideSelectionBar(); clearSelection(); openAddModal(); });

  $('day-modal-close').addEventListener('click', closeDayModal);
  dayModal.addEventListener('click', (e) => { if (e.target === dayModal) closeDayModal(); });
  $('add-modal-close').addEventListener('click', closeAddModal);
  addModal.addEventListener('click', (e) => { if (e.target === addModal) closeAddModal(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closeDayModal(); closeAddModal(); }
  });

  async function init() {
    await seedIfEmpty();
    await loadEvents();
    subscribeRealtime();
    render();
    loadingScreen.classList.add('hidden');
  }
  init();
})();

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
