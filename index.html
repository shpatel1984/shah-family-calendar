<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shah Family Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --samir: #2E7D4F;
  --sneha: #2A2A2A;
  --ryan: #1A5FA8;
  --arya: #C2185B;
  --bg: #FAF7F2;
  --header-bg: #1E1E1E;
  --card-bg: #FFFFFF;
  --border: #E8E2D9;
  --text: #2A2A2A;
  --text-light: #7A7067;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Loading Screen */
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s, visibility 0.5s;
}
#loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.loading-spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--samir);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  margin-top: 20px;
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem; color: var(--text);
}
.loading-sub {
  margin-top: 8px; font-size: 0.85rem; color: var(--text-light);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Header */
header {
  background: var(--header-bg);
  color: #fff;
  padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem; font-weight: 700; letter-spacing: 0.01em;
}
.sync-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.75rem; font-weight: 600;
  padding: 4px 12px; border-radius: 20px;
  background: rgba(46,125,79,0.15); color: #4ADE80;
}
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #4ADE80;
  animation: pulse 2s ease-in-out infinite;
}
.sync-badge.disconnected {
  background: rgba(239,68,68,0.15); color: #F87171;
}
.sync-badge.disconnected .sync-dot {
  background: #F87171; animation: none;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}
.family-legend {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.8rem; font-weight: 500; color: rgba(255,255,255,0.85);
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%;
}

/* Nav Bar */
.nav-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 28px 12px;
}
.nav-month {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem; font-weight: 700;
}
.nav-controls { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--card-bg);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; color: var(--text);
  transition: all 0.15s;
}
.nav-btn:hover { background: var(--border); }
.today-btn {
  height: 40px; padding: 0 18px; border-radius: 20px;
  border: 1.5px solid var(--border); background: var(--card-bg);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 600; color: var(--text);
  transition: all 0.15s;
}
.today-btn:hover { background: var(--border); }
.add-event-btn {
  height: 40px; padding: 0 20px; border-radius: 20px;
  border: none; background: var(--samir); color: #fff;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s;
}
.add-event-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* Calendar Grid */
.calendar-wrapper { padding: 0 28px 28px; }
.weekday-row {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
  margin-bottom: 1px;
}
.weekday-cell {
  text-align: center; padding: 10px 0;
  font-size: 0.75rem; font-weight: 600;
  color: var(--text-light); text-transform: uppercase;
  letter-spacing: 0.08em;
}
.calendar-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
  background: var(--border); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--shadow);
}
.day-cell {
  background: var(--card-bg);
  min-height: 130px; padding: 8px;
  cursor: pointer; transition: background 0.12s;
  display: flex; flex-direction: column;
  position: relative;
}
.day-cell:hover { background: #F9F6F1; }
.day-cell.other-month { background: #F5F1EB; }
.day-cell.other-month .day-num { color: #C5BBB0; }
.day-cell.today { background: #F0F9F4; }
.day-cell.today .day-num {
  background: var(--samir); color: #fff;
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.day-num {
  font-size: 0.82rem; font-weight: 600;
  margin-bottom: 4px; color: var(--text);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
}
.day-events { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow: hidden; }
.event-pill {
  padding: 2.5px 7px; border-radius: 4px;
  font-size: 0.68rem; font-weight: 500;
  color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.4;
}
.event-more {
  font-size: 0.65rem; color: var(--text-light);
  font-weight: 600; padding: 1px 4px;
}

/* Modal Overlay */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; visibility: hidden;
  transition: opacity 0.25s, visibility 0.25s;
}
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal {
  background: var(--card-bg);
  border-radius: 16px;
  width: 100%; max-width: 480px;
  max-height: 85vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: translateY(12px);
  transition: transform 0.25s;
}
.modal-overlay.active .modal { transform: translateY(0); }
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; font-weight: 700;
}
.modal-close {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: #F3EFEA; cursor: pointer;
  font-size: 1.1rem; color: var(--text-light);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--border); }
.modal-body { padding: 16px 24px 24px; }

/* Day Detail Modal */
.day-event-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.day-event-item:last-child { border-bottom: none; }
.day-event-color {
  width: 4px; min-height: 36px; border-radius: 2px;
  flex-shrink: 0; margin-top: 2px;
}
.day-event-info { flex: 1; min-width: 0; }
.day-event-title { font-weight: 600; font-size: 0.9rem; }
.day-event-meta {
  font-size: 0.78rem; color: var(--text-light); margin-top: 2px;
}
.day-event-notes {
  font-size: 0.78rem; color: var(--text-light);
  margin-top: 4px; font-style: italic;
}
.day-event-delete {
  width: 28px; height: 28px; border-radius: 6px;
  border: none; background: transparent; cursor: pointer;
  color: #CCC; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.day-event-delete:hover { background: #FEE2E2; color: #EF4444; }
.no-events {
  text-align: center; padding: 32px 0;
  color: var(--text-light); font-size: 0.9rem;
}
.day-add-btn {
  width: 100%; padding: 10px; margin-top: 12px;
  border: 1.5px dashed var(--border); border-radius: 10px;
  background: transparent; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 600; color: var(--text-light);
  transition: all 0.15s;
}
.day-add-btn:hover { border-color: var(--samir); color: var(--samir); background: #F0F9F4; }

/* Add Event Form */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 0.78rem; font-weight: 600;
  color: var(--text-light); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.form-input, .form-textarea {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  color: var(--text); background: var(--card-bg);
  transition: border-color 0.15s;
  outline: none;
}
.form-input:focus, .form-textarea:focus { border-color: var(--samir); }
.form-textarea { resize: vertical; min-height: 70px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.who-toggles { display: flex; gap: 8px; flex-wrap: wrap; }
.who-toggle {
  padding: 8px 16px; border-radius: 20px;
  border: 2px solid var(--border); background: var(--card-bg);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 600;
  transition: all 0.15s; color: var(--text);
}
.who-toggle.selected {
  color: #fff; border-color: transparent;
}
.who-toggle[data-who="Samir"].selected { background: var(--samir); }
.who-toggle[data-who="Sneha"].selected { background: var(--sneha); }
.who-toggle[data-who="Ryan"].selected { background: var(--ryan); }
.who-toggle[data-who="Arya"].selected { background: var(--arya); }
.form-submit {
  width: 100%; padding: 12px; margin-top: 8px;
  border: none; border-radius: 10px;
  background: var(--samir); color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.form-submit:hover { opacity: 0.9; }
.form-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* Responsive */
@media (max-width: 768px) {
  header { padding: 12px 16px; }
  .header-title { font-size: 1.1rem; }
  .nav-bar { padding: 16px 16px 8px; }
  .nav-month { font-size: 1.3rem; }
  .calendar-wrapper { padding: 0 16px 16px; }
  .day-cell { min-height: 90px; padding: 4px; }
  .day-num { font-size: 0.72rem; width: 22px; height: 22px; }
  .event-pill { font-size: 0.6rem; padding: 1.5px 4px; }
  .family-legend { gap: 10px; }
  .legend-item { font-size: 0.72rem; }
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Shah Family Calendar</div>
  <div class="loading-sub">Loading events…</div>
</div>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="header-title">Shah Family Calendar</div>
    <div class="sync-badge" id="sync-badge">
      <span class="sync-dot"></span>
      <span id="sync-text">Live</span>
    </div>
  </div>
  <div class="family-legend">
    <div class="legend-item"><span class="legend-dot" style="background:var(--samir)"></span>Samir</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--sneha)"></span>Sneha</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--ryan)"></span>Ryan</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--arya)"></span>Arya</div>
  </div>
</header>

<!-- Nav Bar -->
<div class="nav-bar">
  <div class="nav-month" id="nav-month"></div>
  <div class="nav-controls">
    <button class="nav-btn" id="prev-btn" title="Previous month">&#8249;</button>
    <button class="today-btn" id="today-btn">Today</button>
    <button class="nav-btn" id="next-btn" title="Next month">&#8250;</button>
    <button class="add-event-btn" id="add-event-btn">
      <span style="font-size:1.1rem">+</span> Add Event
    </button>
  </div>
</div>

<!-- Calendar -->
<div class="calendar-wrapper">
  <div class="weekday-row">
    <div class="weekday-cell">Sun</div>
    <div class="weekday-cell">Mon</div>
    <div class="weekday-cell">Tue</div>
    <div class="weekday-cell">Wed</div>
    <div class="weekday-cell">Thu</div>
    <div class="weekday-cell">Fri</div>
    <div class="weekday-cell">Sat</div>
  </div>
  <div class="calendar-grid" id="calendar-grid"></div>
</div>

<!-- Day Detail Modal -->
<div class="modal-overlay" id="day-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="day-modal-title"></div>
      <button class="modal-close" id="day-modal-close">✕</button>
    </div>
    <div class="modal-body" id="day-modal-body"></div>
  </div>
</div>

<!-- Add Event Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Event</div>
      <button class="modal-close" id="add-modal-close">✕</button>
    </div>
    <div class="modal-body">
      <form id="add-form">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input class="form-input" type="text" id="f-title" required placeholder="Event name">
        </div>
        <div class="form-row form-group">
          <div>
            <label class="form-label">Start Date</label>
            <input class="form-input" type="date" id="f-start" required>
          </div>
          <div>
            <label class="form-label">End Date</label>
            <input class="form-input" type="date" id="f-end" required>
          </div>
        </div>
        <div class="form-row form-group">
          <div>
            <label class="form-label">Start Time <span style="font-weight:400;text-transform:none">(optional)</span></label>
            <input class="form-input" type="time" id="f-start-time">
          </div>
          <div>
            <label class="form-label">End Time <span style="font-weight:400;text-transform:none">(optional)</span></label>
            <input class="form-input" type="time" id="f-end-time">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Who</label>
          <div class="who-toggles" id="who-toggles">
            <button type="button" class="who-toggle" data-who="Samir">Samir</button>
            <button type="button" class="who-toggle" data-who="Sneha">Sneha</button>
            <button type="button" class="who-toggle" data-who="Ryan">Ryan</button>
            <button type="button" class="who-toggle" data-who="Arya">Arya</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes <span style="font-weight:400;text-transform:none">(optional)</span></label>
          <textarea class="form-textarea" id="f-notes" placeholder="Additional details…"></textarea>
        </div>
        <button type="submit" class="form-submit" id="f-submit">Add Event</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function() {
  // --- Supabase Setup ---
  const SUPABASE_URL = 'https://ptuptzyduhudfkdbyuen.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_SM40EKOS7msjnOqoUPQ2FQ_fAEWf0R0';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // --- State ---
  const COLORS = { Samir: '#2E7D4F', Sneha: '#2A2A2A', Ryan: '#1A5FA8', Arya: '#C2185B' };
  const MEMBERS = ['Samir', 'Sneha', 'Ryan', 'Arya'];
  let events = [];
  let currentYear = 2026;
  let currentMonth = 5; // June (0-indexed)
  let selectedWho = new Set();

  // --- DOM refs ---
  const $ = id => document.getElementById(id);
  const grid = $('calendar-grid');
  const navMonth = $('nav-month');
  const loadingScreen = $('loading-screen');
  const syncBadge = $('sync-badge');
  const syncText = $('sync-text');
  const dayModal = $('day-modal');
  const dayModalTitle = $('day-modal-title');
  const dayModalBody = $('day-modal-body');
  const addModal = $('add-modal');
  const addForm = $('add-form');

  // --- Helpers ---
  function dateStr(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  function parseDate(s) {
    const [y,m,d] = s.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  function fmtDate(s) {
    const d = parseDate(s);
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }
  function fmtTime(t) {
    if (!t) return '';
    const [h,m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hr = h % 12 || 12;
    return `${hr}:${String(m).padStart(2,'0')} ${ampm}`;
  }
  function isToday(y, m, d) {
    const t = new Date();
    return t.getFullYear() === y && t.getMonth() === m && t.getDate() === d;
  }

  function eventsForDate(dateString) {
    return events.filter(e => e.start <= dateString && e.end >= dateString);
  }

  // --- Render Calendar ---
  function render() {
    const monthNames = ['January','February','March','April','May','June',
                        'July','August','September','October','November','December'];
    navMonth.textContent = `${monthNames[currentMonth]} ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevDays = new Date(currentYear, currentMonth, 0).getDate();

    let html = '';
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      let day, month = currentMonth, year = currentYear, isOther = false;
      if (i < firstDay) {
        day = prevDays - firstDay + 1 + i;
        month = currentMonth - 1;
        if (month < 0) { month = 11; year--; }
        isOther = true;
      } else if (i - firstDay >= daysInMonth) {
        day = i - firstDay - daysInMonth + 1;
        month = currentMonth + 1;
        if (month > 11) { month = 0; year++; }
        isOther = true;
      } else {
        day = i - firstDay + 1;
      }

      const ds = dateStr(year, month, day);
      const dayEvents = eventsForDate(ds);
      const today = isToday(year, month, day);
      const classes = ['day-cell'];
      if (isOther) classes.push('other-month');
      if (today) classes.push('today');

      html += `<div class="${classes.join(' ')}" data-date="${ds}">`;
      html += `<div class="day-num">${day}</div>`;
      html += `<div class="day-events">`;

      const maxPills = 4;
      const shown = dayEvents.slice(0, maxPills);
      const remaining = dayEvents.length - maxPills;

      for (const ev of shown) {
        const color = COLORS[ev.who] || '#999';
        html += `<div class="event-pill" style="background:${color}" title="${ev.title} (${ev.who})">${ev.title}</div>`;
      }
      if (remaining > 0) {
        html += `<div class="event-more">+${remaining} more</div>`;
      }
      html += `</div></div>`;
    }
    grid.innerHTML = html;

    // Click handlers on day cells
    grid.querySelectorAll('.day-cell').forEach(cell => {
      cell.addEventListener('click', () => openDayModal(cell.dataset.date));
    });
  }

  // --- Day Detail Modal ---
  function openDayModal(dateString) {
    dayModalTitle.textContent = fmtDate(dateString);
    const dayEvents = eventsForDate(dateString);

    let html = '';
    if (dayEvents.length === 0) {
      html = '<div class="no-events">No events this day</div>';
    } else {
      for (const ev of dayEvents) {
        const color = COLORS[ev.who] || '#999';
        let meta = ev.who;
        if (ev.start !== ev.end) {
          meta += ` · ${parseDate(ev.start).toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${parseDate(ev.end).toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
        }
        if (ev.start_time) {
          meta += ` · ${fmtTime(ev.start_time)}`;
          if (ev.end_time) meta += `–${fmtTime(ev.end_time)}`;
        }
        html += `<div class="day-event-item">
          <div class="day-event-color" style="background:${color}"></div>
          <div class="day-event-info">
            <div class="day-event-title">${esc(ev.title)}</div>
            <div class="day-event-meta">${esc(meta)}</div>
            ${ev.notes ? `<div class="day-event-notes">${esc(ev.notes)}</div>` : ''}
          </div>
          <button class="day-event-delete" data-id="${ev.id}" title="Delete">🗑</button>
        </div>`;
      }
    }
    html += `<button class="day-add-btn" data-date="${dateString}">+ Add Event</button>`;
    dayModalBody.innerHTML = html;

    // Delete handlers
    dayModalBody.querySelectorAll('.day-event-delete').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm('Delete this event?')) return;
        await deleteEvent(btn.dataset.id);
        openDayModal(dateString);
      });
    });

    // Add button in day modal
    dayModalBody.querySelector('.day-add-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      closeDayModal();
      openAddModal(dateString);
    });

    dayModal.classList.add('active');
  }

  function closeDayModal() { dayModal.classList.remove('active'); }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // --- Add Event Modal ---
  function openAddModal(dateString) {
    addForm.reset();
    selectedWho.clear();
    document.querySelectorAll('.who-toggle').forEach(b => b.classList.remove('selected'));
    if (dateString) {
      $('f-start').value = dateString;
      $('f-end').value = dateString;
    }
    addModal.classList.add('active');
  }

  function closeAddModal() { addModal.classList.remove('active'); }

  // Who toggles
  document.querySelectorAll('.who-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const who = btn.dataset.who;
      if (selectedWho.has(who)) {
        selectedWho.delete(who);
        btn.classList.remove('selected');
      } else {
        selectedWho.add(who);
        btn.classList.add('selected');
      }
    });
  });

  // Form submit
  addForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (selectedWho.size === 0) { alert('Please select at least one person.'); return; }
    const title = $('f-title').value.trim();
    const start = $('f-start').value;
    const end = $('f-end').value;
    const startTime = $('f-start-time').value || null;
    const endTime = $('f-end-time').value || null;
    const notes = $('f-notes').value.trim() || null;

    if (!title || !start || !end) return;
    if (end < start) { alert('End date must be on or after start date.'); return; }

    $('f-submit').disabled = true;
    $('f-submit').textContent = 'Saving…';

    const rows = [...selectedWho].map(who => ({
      title, who, start, end,
      start_time: startTime, end_time: endTime, notes
    }));

    const { error } = await sb.from('events').insert(rows);
    if (error) { alert('Error saving: ' + error.message); }

    $('f-submit').disabled = false;
    $('f-submit').textContent = 'Add Event';
    closeAddModal();
  });

  // --- Supabase CRUD ---
  async function loadEvents() {
    const { data, error } = await sb.from('events').select('*');
    if (error) { console.error('Load error:', error); return; }
    events = data || [];
  }

  async function deleteEvent(id) {
    const { error } = await sb.from('events').delete().eq('id', id);
    if (error) alert('Error deleting: ' + error.message);
  }

  // --- Seed Data ---
  async function seedIfEmpty() {
    const { count, error } = await sb.from('events').select('*', { count: 'exact', head: true });
    if (error || count > 0) return;

    const seed = [];
    function add(title, start, end, whoList, startTime, endTime, notes) {
      for (const who of whoList) {
        seed.push({
          title, start, end, who,
          start_time: startTime || null,
          end_time: endTime || null,
          notes: notes || null
        });
      }
    }
    const ALL = ['Samir','Sneha','Ryan','Arya'];
    const SS = ['Samir','Sneha'];
    const RA = ['Ryan','Arya'];

    add('Nisha & Ronak Family – Miami','2026-04-02','2026-04-05', ALL);
    add('Mexico (Departure)','2026-06-04','2026-06-04', SS);
    add('Mexico Trip','2026-06-05','2026-06-08', SS);
    add('Mexico (Return)','2026-06-09','2026-06-09', SS);
    add('Working from Orlando','2026-06-10','2026-06-12', SS);
    add('Orlando – Grandparents','2026-06-04','2026-06-13', ['Arya']);
    add('Orlando – Grandparents','2026-06-04','2026-06-07', ['Ryan']);
    add('UCF Baseball Camp','2026-06-08','2026-06-11', ['Ryan'], '09:00','15:00');
    add('Orlando – Grandparents','2026-06-12','2026-06-12', ['Ryan']);
    add('Return to Miami','2026-06-13','2026-06-13', ALL);
    add('MCDS – Day Camp','2026-06-15','2026-06-19', ['Arya']);
    add('MCDS – Architecture Camp','2026-06-15','2026-06-19', ['Ryan']);
    add('MOCA Camp','2026-07-13','2026-07-17', ['Arya']);
    add('School of Rock Camp','2026-07-20','2026-07-24', ['Ryan']);
    add('Shah Family Trip - NJ (Depart)','2026-07-31','2026-07-31', ALL);
    add('Shah Family Trip - NJ','2026-08-01','2026-08-02', SS);
    add('Shah Family Trip - NJ','2026-08-01','2026-08-08', RA);
    add('Working from NJ','2026-08-03','2026-08-07', SS);
    add('Shah Family Trip - NJ','2026-08-08','2026-08-08', SS);
    add('Shah Family Trip - NJ (Return)','2026-08-09','2026-08-09', ALL);
    add('First Day of School','2026-08-13','2026-08-13', RA);

    const { error: seedError } = await sb.from('events').insert(seed);
    if (seedError) console.error('Seed error:', seedError);
  }

  // --- Realtime ---
  function subscribeRealtime() {
    sb.channel('events-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, (payload) => {
        if (payload.eventType === 'INSERT') {
          events.push(payload.new);
        } else if (payload.eventType === 'DELETE') {
          events = events.filter(e => e.id !== payload.old.id);
        } else if (payload.eventType === 'UPDATE') {
          const idx = events.findIndex(e => e.id === payload.new.id);
          if (idx >= 0) events[idx] = payload.new;
        }
        render();
      })
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          syncBadge.classList.remove('disconnected');
          syncText.textContent = 'Live';
        } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
          syncBadge.classList.add('disconnected');
          syncText.textContent = 'Offline';
        }
      });
  }

  // --- Nav ---
  $('prev-btn').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    render();
  });
  $('next-btn').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    render();
  });
  $('today-btn').addEventListener('click', () => {
    const t = new Date();
    currentYear = t.getFullYear();
    currentMonth = t.getMonth();
    render();
  });
  $('add-event-btn').addEventListener('click', () => openAddModal());

  // Modal close handlers
  $('day-modal-close').addEventListener('click', closeDayModal);
  dayModal.addEventListener('click', (e) => { if (e.target === dayModal) closeDayModal(); });
  $('add-modal-close').addEventListener('click', closeAddModal);
  addModal.addEventListener('click', (e) => { if (e.target === addModal) closeAddModal(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closeDayModal(); closeAddModal(); }
  });

  // --- Init ---
  async function init() {
    await seedIfEmpty();
    await loadEvents();
    subscribeRealtime();
    render();
    loadingScreen.classList.add('hidden');
  }
  init();
})();
</script>
</body>
</html>
